services:
  postgres:
    image: postgres:15-alpine
    container_name: ibdf_postgres
    environment:
      POSTGRES_DB: passenger_forecast
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d passenger_forecast"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ibdf_api
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000 --reload
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: passenger_forecast
      DB_USER: postgres
      DB_PASSWORD: postgres
      JWT_SECRET: change-me-in-production
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    depends_on:
      postgres:
        condition: service_healthy

  ui:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ibdf_ui
    command: streamlit run ui/app.py --server.port=8501 --server.address=0.0.0.0
    environment:
      API_URL: http://api:8000
    ports:
      - "8501:8501"
    volumes:
      - .:/app
    depends_on:
      - api

volumes:
  postgres_data:
